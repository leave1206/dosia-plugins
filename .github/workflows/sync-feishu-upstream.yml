name: Sync feishu skills from larksuite/cli upstream

# Pulls plugins/feishu/skills/ from the latest larksuite/cli release tag
# every Monday morning. If the upstream content changed, opens a PR for review.
#
# Why a PR (not direct push to main):
# - Preserves human review of upstream changes (rare but possible: breaking
#   schema changes, new commands DOSIA hasn't tested, removed commands).
# - Surfaces what changed in the diff (tags + file delta).
#
# Manual trigger via "workflow_dispatch" supported for ad-hoc syncs.

on:
  schedule:
    - cron: "0 1 * * 1"  # 09:00 Beijing every Monday
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout dosia-plugins
        uses: actions/checkout@v4

      - name: Resolve latest larksuite/cli tag
        id: upstream
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/larksuite/cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved upstream tag: $TAG"

      - name: Sparse-checkout upstream skills/
        run: |
          mkdir upstream
          cd upstream
          git init
          git remote add origin https://github.com/larksuite/cli.git
          git config core.sparseCheckout true
          echo "skills/" > .git/info/sparse-checkout
          git fetch --depth=1 origin "${{ steps.upstream.outputs.tag }}"
          git checkout FETCH_HEAD

      - name: Replace plugins/feishu/skills/
        run: |
          rm -rf plugins/feishu/skills
          cp -r upstream/skills plugins/feishu/skills
          rm -rf upstream

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet plugins/feishu/skills; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(feishu): sync skills from larksuite/cli@${{ steps.upstream.outputs.tag }}"
          title: "chore(feishu): sync skills from larksuite/cli@${{ steps.upstream.outputs.tag }}"
          body: |
            Automated upstream sync.

            **Source**: `larksuite/cli@${{ steps.upstream.outputs.tag }}`
            **Trigger**: ${{ github.event_name }}

            Review the diff before merge — upstream may have introduced new
            commands, removed deprecated ones, or changed argument schemas.
            DOSIA's main repo `scripts/sync-feishu-official-skills.mjs` will
            pull from `dosia-plugins/main` after this PR merges; users get the
            new content via PLUGIN_APPLY_UPDATE on their next upgrade.
          branch: chore/sync-feishu-${{ steps.upstream.outputs.tag }}
          delete-branch: true
